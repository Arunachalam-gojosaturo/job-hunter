name: Job Hunter Agent

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  hunt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install requests feedparser
      - name: Run Agent
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: llama-3.1-8b-instant
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          SMS_GATEWAY_EMAIL: ${{ secrets.SMS_GATEWAY_EMAIL }}
          YOUR_NAME: ${{ secrets.YOUR_NAME }}
          YOUR_SKILLS: ${{ secrets.YOUR_SKILLS }}
          YOUR_DELIVERY: "24 hours"
          YOUR_RATE: "30 USD"
          KEYWORDS: "hire,hiring,paid,freelance,developer,budget,USD,contract,remote,gig"
        run: python3 scripts/job_agent_once.py
